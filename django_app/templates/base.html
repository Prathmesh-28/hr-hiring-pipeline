<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}HR Hiring Portal{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
    }

    nav {
      background: #0f172a;
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    nav .brand {
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: -0.3px;
      text-decoration: none;
    }
    nav .nav-links a {
      color: #94a3b8;
      text-decoration: none;
      margin-left: 24px;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    nav .nav-links a:hover { color: white; }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
    h2 { font-size: 1.4rem; font-weight: 600; margin-bottom: 16px; }
    p.subtitle { color: #64748b; margin-bottom: 32px; font-size: 1rem; }

    .card {
      background: white;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      padding: 24px;
    }

    .btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.88; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-dark { background: #0f172a; color: white; }
    .btn-full { width: 100%; text-align: center; }

    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #1e293b;
      background: white;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: #2563eb; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }

    .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; }
    .alert-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      color: white;
    }

    @media (max-width: 640px) {
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  <nav>
    <a class="brand" href="/">HR Hiring Portal</a>
    <div class="nav-links">
      <a href="/">Careers</a>
      <a href="/apply/">Apply</a>
      {% if user.is_authenticated %}
        <a href="/hr/dashboard/">Dashboard</a>
        <a href="/hr/logout/">Logout</a>
      {% else %}
        <a href="/hr/login/">HR Login</a>
      {% endif %}
    </div>
  </nav>

  {% block content %}{% endblock %}
</body>
</html>
